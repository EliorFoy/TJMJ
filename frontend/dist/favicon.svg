<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 麻将牌底色 -->
  <rect x="2" y="2" width="60" height="60" rx="6" ry="6" fill="#F5F0E8" stroke="#8B7355" stroke-width="2"/>
  <!-- 绿色牌面（發财绿） -->
  <rect x="6" y="6" width="52" height="52" rx="3" ry="3" fill="#0D7C3D" stroke="#075A2B" stroke-width="1"/>
  <!-- 發 字 -->
  <text x="32" y="46" text-anchor="middle" font-size="36" font-family="KaiTi, STKaiti, SimSun, serif" fill="#FFD700" font-weight="bold">發</text>
</svg>
